<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Daily Report Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1B3A6B;--blue:#2563EB;--blue-d:#1D4ED8;
  --green:#059669;--green-d:#065F46;--green-l:#D1FAE5;
  --red:#DC2626;--red-d:#7F1D1D;--red-l:#FEE2E2;
  --amber:#D97706;--amber-d:#78350F;--amber-l:#FEF3C7;
  --slate:#0F172A;--card:#1E293B;--surface:#334155;
  --border:#334155;--muted:#64748B;--text:#E2E8F0;--sub:#94A3B8
}
body{background:var(--slate);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh}

/* ── UPLOADER ── */
#uploader{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px}


.tagline{font-size:.8rem;color:var(--sub);margin-bottom:48px}

.upload-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:720px;margin-bottom:24px}
.drop-zone{background:var(--card);border:2px dashed var(--border);border-radius:12px;padding:32px 24px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.drop-zone:hover,.drop-zone.over{border-color:var(--blue);background:#1e2f4a}
.drop-zone.ready{border-color:var(--green);border-style:solid;background:#0a1f18}
.dz-icon{font-size:2rem;margin-bottom:12px;opacity:.5}
.dz-label{font-size:.9rem;font-weight:600;color:var(--text);margin-bottom:4px}
.dz-sub{font-size:.75rem;color:var(--sub)}
.dz-filename{font-size:.75rem;color:#6EE7B7;margin-top:8px;font-weight:600}
.dz-input{position:absolute;inset:0;opacity:0;cursor:pointer}

.gen-btn{background:var(--blue);color:#fff;border:none;border-radius:10px;padding:14px 40px;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .15s;width:100%;max-width:720px}
.gen-btn:hover{background:var(--blue-d);transform:translateY(-1px)}
.gen-btn:disabled{background:var(--surface);color:var(--muted);cursor:not-allowed;transform:none}
.gen-btn.ready{background:linear-gradient(135deg,var(--blue),#7C3AED)}

.status{font-size:.8rem;color:var(--sub);margin-top:12px;min-height:20px;text-align:center}
.status.ok{color:#6EE7B7}
.status.err{color:#FCA5A5}

/* ── REPORT ── */
#report{display:none;background:var(--slate)}

.r-header{background:linear-gradient(135deg,var(--navy) 0%,#1e40af 100%);padding:20px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--blue)}
.r-title{font-size:1.3rem;font-weight:800;color:#fff;letter-spacing:-.02em}
.r-meta{font-size:.75rem;color:#93C5FD;margin-top:3px}
.r-badge{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:8px 16px;text-align:right}
.r-badge-val{font-size:.88rem;font-weight:700;color:#fff}
.r-badge-sub{font-size:.7rem;color:#93C5FD}
.back-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:6px 14px;color:#fff;font-size:.75rem;cursor:pointer;margin-right:16px}
.back-btn:hover{background:rgba(255,255,255,.2)}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;padding:20px 28px}
.kpi-tile{background:var(--card);border-radius:10px;padding:14px 16px;border-top:3px solid var(--c,#2563EB)}
.kpi-label{font-size:.67rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.kpi-value{font-size:1.6rem;font-weight:800;color:#F1F5F9;line-height:1}
.kpi-sub{font-size:.72rem;color:var(--muted);margin-top:4px}

.mkt-box{margin:0 28px 20px;background:#0C1A3A;border:1px solid #1D4ED8;border-radius:12px;overflow:hidden}
.mkt-box-hdr{background:linear-gradient(90deg,#1D4ED8,#2563EB);padding:10px 18px}
.mkt-box-title{font-size:.88rem;font-weight:700;color:#fff}
.mkt-box-sub{font-size:.73rem;color:#BFDBFE}
.mkt-cards{display:flex;flex-wrap:wrap;gap:12px;padding:16px 18px}
.mkt-card{background:#0F172A;border:1px solid #1E3A8A;border-radius:8px;padding:12px 16px;min-width:170px;flex:1}
.mkt-card-name{font-size:.78rem;font-weight:700;color:#93C5FD;margin-bottom:8px}
.mkt-kpis{display:flex;flex-wrap:wrap;gap:10px}
.mkt-kpi{display:flex;flex-direction:column;align-items:center;min-width:48px}
.mkt-kpi-val{font-size:1.1rem;font-weight:800;color:var(--text)}
.mkt-kpi-lbl{font-size:.64rem;color:var(--muted);text-align:center;line-height:1.3}
.mkt-kpi-lbl em{color:var(--sub);font-style:normal;display:block}

.filter-bar{display:flex;gap:8px;flex-wrap:wrap;padding:0 28px 16px}
.filter-btn{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:5px 14px;font-size:.75rem;color:var(--sub);cursor:pointer;transition:all .15s}
.filter-btn:hover,.filter-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}
.filter-btn.f-mkt.active{background:#1D4ED8;border-color:#1D4ED8}
.filter-btn.f-man.active{background:#C2410C;border-color:#C2410C}
.filter-btn.f-oth.active{background:#B45309;border-color:#B45309}
.filter-btn.f-vdcl.active{background:#B91C1C;border-color:#B91C1C}

.camps-container{padding:0 28px 20px;display:flex;flex-direction:column;gap:14px}
.camp-block{border-radius:10px;overflow:hidden;border:1px solid #1E293B}
.camp-hdr{display:flex;align-items:center;gap:10px;padding:10px 16px;flex-wrap:wrap}
.camp-mkt{background:linear-gradient(90deg,#1E40AF,#2563EB)}
.camp-man{background:linear-gradient(90deg,#7C2D12,#C2410C)}
.camp-oth{background:linear-gradient(90deg,#78350F,#D97706)}
.camp-vdcl{background:linear-gradient(90deg,#7F1D1D,#DC2626)}
.camp-title{font-size:.88rem;font-weight:700;color:#fff}
.camp-meta{font-size:.72rem;color:rgba(255,255,255,.6);margin-left:auto}
.badge{font-size:.63rem;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em}
.badge-mkt{background:#1D4ED8;color:#DBEAFE}
.badge-man{background:#C2410C;color:#FFEDD5}
.badge-oth{background:#B45309;color:#FEF3C7}
.badge-vdcl{background:#DC2626;color:#FEE2E2}
.tbl-scroll{overflow-x:auto;background:var(--card)}
.dtbl{width:100%;border-collapse:collapse;font-size:.77rem}
.dtbl thead tr{background:#0F172A}
.dtbl th{padding:7px 10px;text-align:right;font-size:.67rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;border-bottom:1px solid var(--slate)}
.dtbl th.th-a{text-align:left;width:190px}
.dtbl td{padding:6px 10px;text-align:right;border-bottom:1px solid #0F172A;vertical-align:middle}
.dtbl tbody tr:hover{background:#243044!important}
.td-name{text-align:left!important;font-weight:500;color:var(--text);white-space:nowrap}
.td-num{font-variant-numeric:tabular-nums;color:#CBD5E1}
.td-bold{font-weight:700;color:#F1F5F9}
.td-pct{font-size:.65rem;color:#475569;margin-left:3px}
.td-enr{font-weight:700;color:#6EE7B7}
.bar-w{background:#0F172A;border-radius:3px;height:8px;width:72px;overflow:hidden;display:inline-block;vertical-align:middle}
.bar-f{height:100%;background:linear-gradient(90deg,#2563EB,#60A5FA);border-radius:3px}
.row-vdcl{background:#2D0A0A!important}.row-vdcl td{color:#FCA5A5!important}
.row-man{background:#1C1000!important}.row-man td{color:#FDE68A!important}
.row-enr{background:#071F14!important}

/* ── ACTION PLAN ── */
.ap-wrap{padding:0 28px 40px}
.ap-hdr{background:linear-gradient(90deg,#1B3A6B,#1e40af);border-radius:10px;padding:14px 20px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.ap-hdr-title{font-size:.95rem;font-weight:700;color:#fff}
.ap-hdr-sub{font-size:.72rem;color:#BFDBFE;margin-top:2px}
.ap-hdr-badge{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:6px 14px;text-align:right}
.ap-hdr-badge-val{font-size:.8rem;font-weight:700;color:#fff}
.ap-hdr-badge-sub{font-size:.68rem;color:#93C5FD}

.health-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:18px}
.health-tile{background:var(--card);border-radius:8px;padding:12px 14px}
.ht-lbl{font-size:.63rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.ht-val{font-size:1.45rem;font-weight:800;line-height:1.1}
.ht-sub{font-size:.68rem;color:var(--muted);margin-top:2px}

.ap-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:700px){.ap-cols{grid-template-columns:1fr}.upload-grid{grid-template-columns:1fr}}

.sec-lbl{font-size:.63rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin:0 0 9px}
.action-items{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.action-item{background:var(--card);border-radius:8px;padding:11px 14px}
.action-item.crit{border-left:3px solid #DC2626;border-radius:0 8px 8px 0}
.action-item.high{border-left:3px solid #D97706;border-radius:0 8px 8px 0}
.action-item.low{border-left:3px solid #059669;border-radius:0 8px 8px 0}
.ai-title{font-size:.82rem;font-weight:700;color:#F1F5F9;margin-bottom:3px}
.ai-desc{font-size:.72rem;color:var(--sub);line-height:1.5;margin-bottom:7px}
.ai-tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:.61rem;font-weight:600;padding:2px 8px;border-radius:20px}
.tag-ytel{background:#1D4ED8;color:#DBEAFE}
.tag-list{background:#B45309;color:#FEF3C7}
.tag-comp{background:#7F1D1D;color:#FEE2E2}
.tag-agent{background:#5B21B6;color:#EDE9FE}
.tag-ops{background:#065F46;color:#D1FAE5}

.agent-tbl-wrap{background:var(--card);border-radius:8px;overflow:hidden;margin-bottom:14px}
.atbl{width:100%;border-collapse:collapse;font-size:.74rem}
.atbl thead tr{background:#0F172A}
.atbl th{padding:7px 8px;text-align:left;font-size:.62rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--slate)}
.atbl th:not(:first-child){text-align:center}
.atbl td{padding:7px 8px;border-bottom:1px solid #0F172A;color:var(--text);font-size:.74rem}
.atbl td:not(:first-child){text-align:center}
.atbl tbody tr:last-child td{border-bottom:none}
.atbl .good{color:#6EE7B7;font-weight:700}
.atbl .bad-r{color:#FCA5A5;font-weight:700}
.atbl .bad-a{color:#FDE68A;font-weight:700}
.row-bad-r{background:#2D0A0A}
.row-bad-a{background:#1C1000}

.owner-tbl-wrap{background:var(--card);border-radius:8px;overflow:hidden}
.owner-tbl{width:100%;border-collapse:collapse;font-size:.73rem}
.owner-tbl thead tr{background:#0F172A}
.owner-tbl th{padding:7px 8px;text-align:left;font-size:.62rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--slate)}
.owner-tbl td{padding:7px 8px;border-bottom:1px solid #0F172A;color:var(--text)}
.owner-tbl tbody tr:last-child td{border-bottom:none}
.tpill{font-size:.61rem;font-weight:600;padding:2px 9px;border-radius:20px}
.tp-today{background:#7F1D1D;color:#FEE2E2}
.tp-week{background:#78350F;color:#FEF3C7}
.tp-month{background:#064E3B;color:#D1FAE5}

.r-footer{text-align:center;padding:12px 28px 32px;font-size:.7rem;color:#334155}
</style>
</head>
<body>

<!-- ══════════════════ UPLOADER SCREEN ══════════════════ -->
<div id="uploader">
  <div class="tagline">Daily Call Report Generator · Drop files, get report</div>

  <div class="upload-grid">
    <div class="drop-zone" id="dz-calls" ondragover="dzOver(event,'dz-calls')" ondragleave="dzOut('dz-calls')" ondrop="dzDrop(event,'calls')">
      <input class="dz-input" type="file" accept=".csv" onchange="fileInput(event,'calls')">
      <div class="dz-icon">📊</div>
      <div class="dz-label">Ytel / VICi Call Export</div>
      <div class="dz-sub">Drop CSV here or click to browse</div>
      <div class="dz-filename" id="fn-calls"></div>
    </div>
    <div class="drop-zone" id="dz-enroll" ondragover="dzOver(event,'dz-enroll')" ondragleave="dzOut('dz-enroll')" ondrop="dzDrop(event,'enroll')">
      <input class="dz-input" type="file" accept=".xlsx,.xls" onchange="fileInput(event,'enroll')">
      <div class="dz-icon">✅</div>
      <div class="dz-label">Enrolled File</div>
      <div class="dz-sub">Drop XLSX here or click to browse</div>
      <div class="dz-filename" id="fn-enroll"></div>
    </div>
  </div>

  <button class="gen-btn" id="gen-btn" disabled onclick="generateReport()">Drop both files to generate report</button>
  <div class="status" id="status"></div>
</div>

<!-- ══════════════════ REPORT SCREEN ══════════════════ -->
<div id="report"></div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let FILES = {calls:null, enroll:null};
let CALL_ROWS = [], ENROLL_MAP = {}, DEBT_MAP = {};

// ── Drag/Drop helpers ─────────────────────────────────────────────────────────
function dzOver(e,id){e.preventDefault();document.getElementById(id).classList.add('over')}
function dzOut(id){document.getElementById(id).classList.remove('over')}
function dzDrop(e,type){
  e.preventDefault();
  dzOut(type==='calls'?'dz-calls':'dz-enroll');
  const file=e.dataTransfer.files[0];
  if(file) setFile(type,file);
}
function fileInput(e,type){const file=e.target.files[0];if(file)setFile(type,file)}
function setFile(type,file){
  FILES[type]=file;
  const id=type==='calls'?'dz-calls':'dz-enroll';
  document.getElementById(id).classList.add('ready');
  document.getElementById('fn-'+type).textContent=file.name;
  checkReady();
}
function checkReady(){
  const btn=document.getElementById('gen-btn');
  if(FILES.calls&&FILES.enroll){
    btn.disabled=false;
    btn.classList.add('ready');
    btn.textContent='Generate Report →';
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const CMAP={LenderPr:'LenderProcessing',USAbrigh:'USAbright',PLIinbou:'PLIinbound',AGENTDIR:'AGENTDIRECT'};
const MKT_C=new Set(['LenderProcessing','USAbright','PLIinbound','BlueSuccess']);
const MAN_C=new Set(['AGENTDIRECT','1001','1000','1234']);

function normCamp(c){return CMAP[c]||c}
function classify(r){
  const ug=(r.user_group||'').trim();
  const cid=normCamp(r.campaign_id||'');
  if(['VDCL','VDAD'].includes(r.user)) return 'VDCL';
  if(!ug||MAN_C.has(cid)) return 'Manual';
  if(MKT_C.has(cid)) return 'Marketing';
  return 'Other';
}
function fmtDur(s){
  s=Math.round(s);
  if(s<60)return s+'s';
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;
  if(h)return h+'h '+String(m).padStart(2,'0')+'m';
  return m+'m '+String(sc).padStart(2,'0')+'s';
}
function pct(n,d){return d?((n/d)*100).toFixed(1)+'%':'0.0%'}
function fmt$(n){return '$'+Math.round(n).toLocaleString()}
function setStatus(msg,cls=''){
  const el=document.getElementById('status');
  el.textContent=msg; el.className='status '+(cls||'');
}

// ── Parse Calls CSV ───────────────────────────────────────────────────────────
function parseCSV(text){
  const lines=text.split('\n');
  const headers=lines[0].split(',').map(h=>h.replace(/^"|"$/g,'').trim());
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const line=lines[i].trim();
    if(!line) continue;
    const vals=[];let cur='',inQ=false;
    for(let c=0;c<line.length;c++){
      const ch=line[c];
      if(ch==='"'){inQ=!inQ}
      else if(ch===','&&!inQ){vals.push(cur);cur=''}
      else{cur+=ch}
    }
    vals.push(cur);
    if(vals.length<2) continue;
    const obj={};
    headers.forEach((h,i)=>{obj[h]=(vals[i]||'').replace(/^"|"$/g,'').trim()});
    obj._sec=parseInt(obj.length_in_sec)||0;
    obj._campaign=normCamp(obj.campaign_id||'');
    obj._type=classify(obj);
    rows.push(obj);
  }
  return rows;
}

// ── Parse Enroll XLSX ─────────────────────────────────────────────────────────
function parseEnroll(ab){
  const wb=XLSX.read(ab,{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const data=XLSX.utils.sheet_to_json(ws,{defval:''});
  const em={},dm={};
  data.forEach(row=>{
    const name=(row['Assigned To']||'').toString().trim().toLowerCase();
    if(!name) return;
    em[name]=(em[name]||0)+1;
    dm[name]=(dm[name]||0)+parseFloat(row['Enrolled Debt']||0);
  });
  return {em,dm,total:data.length};
}

// ── Main generator ────────────────────────────────────────────────────────────
async function generateReport(){
  setStatus('Reading files…');
  document.getElementById('gen-btn').disabled=true;

  try{
    // Read calls CSV
    const csvText=await FILES.calls.text();
    CALL_ROWS=parseCSV(csvText);
    if(!CALL_ROWS.length) throw new Error('No call rows found in CSV');

    // Read enroll XLSX
    const enrollAB=await FILES.enroll.arrayBuffer();
    const {em,dm,total:enrollTotal}=parseEnroll(enrollAB);
    ENROLL_MAP=em; DEBT_MAP=dm;

    setStatus('Building report…');
    const html=buildReport(CALL_ROWS,ENROLL_MAP,DEBT_MAP,enrollTotal);
    const reportEl=document.getElementById('report');
    reportEl.innerHTML=html;
    document.getElementById('uploader').style.display='none';
    reportEl.style.display='block';
    setStatus('');
  }catch(err){
    setStatus('Error: '+err.message,'err');
    document.getElementById('gen-btn').disabled=false;
  }
}

// ── Build Report HTML ─────────────────────────────────────────────────────────
function buildReport(rows,em,dm,enrollTotal){
  const total=rows.length;
  const totalSec=rows.reduce((a,r)=>a+r._sec,0);
  const mktRows=rows.filter(r=>r._type==='Marketing');
  const manRows=rows.filter(r=>r._type==='Manual');
  const vdclRows=rows.filter(r=>r._type==='VDCL');
  const gt30=rows.filter(r=>r._sec>30).length;
  const gt2m=rows.filter(r=>r._sec>120).length;
  const gt10m=rows.filter(r=>r._sec>600).length;
  const gt30m=rows.filter(r=>r._sec>1800).length;
  const dead=rows.filter(r=>r._sec<=30).length;
  const dncCount=rows.filter(r=>r.status==='DNC').length;
  const inbound=rows.filter(r=>r.direction==='inbound').length;
  const outbound=rows.filter(r=>r.direction==='outbound').length;
  const totalDebt=Object.values(dm).reduce((a,b)=>a+b,0);

  // Date from data
  const dateStr=rows[0]?.call_date?.slice(0,10)||'';

  // After-hours VDCL
  const ahVdcl=rows.filter(r=>['VDCL','VDAD'].includes(r.user)&&parseInt((r.call_date||'').slice(11,13))>=18).length;

  // PLR / PLIinbound issues
  const plrDrops=rows.filter(r=>r._campaign==='PLR'&&['DROP','TIMEOT','AA','AFTHRS'].includes(r.status)).length;
  const pliTotal=rows.filter(r=>r._campaign==='PLIinbound').length;
  const pliShort=rows.filter(r=>r._campaign==='PLIinbound'&&r._sec<=30).length;
  const pliDrops=rows.filter(r=>r._campaign==='PLIinbound'&&['DROP','TIMEOT'].includes(r.status)).length;

  // Agent stats
  const AS={};
  rows.forEach(r=>{
    if(['VDCL','VDAD'].includes(r.user)) return;
    const n=r.full_name||r.user||'Unknown';
    if(!AS[n]) AS[n]={calls:0,sec:0,short:0,gt30:0,gt45:0,gt2m:0,gt10m:0,gt30m:0};
    const d=AS[n],s=r._sec;
    d.calls++;d.sec+=s;
    if(s<=30)d.short++;
    if(s>30)d.gt30++;
    if(s>45)d.gt45++;
    if(s>120)d.gt2m++;
    if(s>600)d.gt10m++;
    if(s>1800)d.gt30m++;
  });

  // Marketing by campaign
  const MBY={};
  mktRows.forEach(r=>{
    const c=r._campaign;
    if(!MBY[c])MBY[c]={calls:0,sec:0,gt30:0,gt2m:0,gt10m:0,gt30m:0};
    const d=MBY[c];d.calls++;d.sec+=r._sec;
    if(r._sec>30)d.gt30++;
    if(r._sec>120)d.gt2m++;
    if(r._sec>600)d.gt10m++;
    if(r._sec>1800)d.gt30m++;
  });

  // Top enrollers
  const topEnrollers=Object.keys(AS)
    .filter(n=>(em[n.trim().toLowerCase()]||0)>0)
    .map(n=>{const key=n.trim().toLowerCase();return{name:n,enr:em[key]||0,debt:dm[key]||0,calls:AS[n].calls,sec:AS[n].sec}})
    .sort((a,b)=>b.enr-a.enr||b.debt-a.debt).slice(0,7);

  // Problem agents (≥25 calls, high short%)
  const problemAgents=Object.entries(AS)
    .filter(([n,d])=>d.calls>=25)
    .map(([n,d])=>({name:n,calls:d.calls,short:d.short,shortPct:d.short/d.calls*100,enr:em[n.trim().toLowerCase()]||0}))
    .sort((a,b)=>b.shortPct-a.shortPct).slice(0,5);

  // Campaigns ordered
  const campSet={};
  rows.forEach(r=>{
    if(!campSet[r._campaign])campSet[r._campaign]={type:r._type,calls:0,sec:0,gt30:0,gt45:0,gt2m:0,gt10m:0,gt30m:0,agents:{}};
    const d=campSet[r._campaign],s=r._sec;
    d.calls++;d.sec+=s;
    if(s>30)d.gt30++;if(s>45)d.gt45++;if(s>120)d.gt2m++;if(s>600)d.gt10m++;if(s>1800)d.gt30m++;
    const n=r.full_name||r.user;
    if(!d.agents[n])d.agents[n]={calls:0,sec:0,gt30:0,gt2m:0,gt10m:0,gt30m:0,type:r._type};
    const a=d.agents[n],a2=a;
    a2.calls++;a2.sec+=s;if(s>30)a2.gt30++;if(s>120)a2.gt2m++;if(s>600)a2.gt10m++;if(s>1800)a2.gt30m++;
    a2.type=r._type;
  });
  const campsOrdered=Object.keys(campSet).sort((a,b)=>{
    const rank=c=>MKT_C.has(c)?0:MAN_C.has(c)?1:2;
    return rank(a)-rank(b)||a.localeCompare(b);
  });

  // ── RENDER ─────────────────────────────────────────────────────────────────
  const typeClass={Marketing:'camp-mkt',Manual:'camp-man',Other:'camp-oth',VDCL:'camp-vdcl'};
  const typeBadge={
    Marketing:'<span class="badge badge-mkt">Marketing</span>',
    Manual:'<span class="badge badge-man">Manual</span>',
    Other:'<span class="badge badge-oth">Other</span>',
    VDCL:'<span class="badge badge-vdcl">VDCL</span>'
  };

  // Marketing cards HTML
  let mktCardsHtml='';
  Object.entries(MBY).forEach(([c,d])=>{
    mktCardsHtml+=`<div class="mkt-card">
      <div class="mkt-card-name">${c}</div>
      <div class="mkt-kpis">
        <div class="mkt-kpi"><span class="mkt-kpi-val">${d.calls}</span><span class="mkt-kpi-lbl">Calls</span></div>
        <div class="mkt-kpi"><span class="mkt-kpi-val">${d.gt2m}</span><span class="mkt-kpi-lbl">&gt;2 min<em>${pct(d.gt2m,d.calls)}</em></span></div>
        <div class="mkt-kpi"><span class="mkt-kpi-val">${d.gt10m}</span><span class="mkt-kpi-lbl">&gt;10 min<em>${pct(d.gt10m,d.calls)}</em></span></div>
        <div class="mkt-kpi"><span class="mkt-kpi-val">${fmtDur(d.sec)}</span><span class="mkt-kpi-lbl">Talk</span></div>
      </div>
    </div>`;
  });

  // Campaign tables
  let campsHtml='';
  campsOrdered.forEach(camp=>{
    const cd=campSet[camp];
    const agents=Object.entries(cd.agents).sort((a,b)=>b[1].calls-a[1].calls);
    const maxC=Math.max(...agents.map(a=>a[1].calls),1);
    let rowsHtml='';
    agents.forEach(([n,a])=>{
      const ac=a.calls,avg=ac?Math.round(a.sec/ac):0;
      const bw=Math.round(a.calls/maxC*100);
      const enr=em[n.trim().toLowerCase()]||0;
      let rowCls='';
      if(a.type==='VDCL')rowCls='row-vdcl';
      else if(a.type==='Manual')rowCls='row-man';
      else if(enr>0)rowCls='row-enr';
      rowsHtml+=`<tr class="${rowCls}">
        <td class="td-name">${n}</td>
        <td class="td-num"><div class="bar-w"><div class="bar-f" style="width:${bw}%"></div></div></td>
        <td class="td-num td-bold">${ac}</td>
        <td class="td-num">${a.gt30}<span class="td-pct">${pct(a.gt30,ac)}</span></td>
        <td class="td-num">${a.gt2m}<span class="td-pct">${pct(a.gt2m,ac)}</span></td>
        <td class="td-num">${a.gt10m}<span class="td-pct">${pct(a.gt10m,ac)}</span></td>
        <td class="td-num">${a.gt30m}<span class="td-pct">${pct(a.gt30m,ac)}</span></td>
        <td class="td-num">${fmtDur(avg)}</td>
        <td class="td-num td-bold">${fmtDur(a.sec)}</td>
        <td class="td-num ${enr>0?'td-enr':''}">${enr>0?enr:'-'}</td>
      </tr>`;
    });
    campsHtml+=`<div class="camp-block" data-type="${cd.type}">
      <div class="camp-hdr ${typeClass[cd.type]||'camp-oth'}">
        <span class="camp-title">${camp}</span>
        ${typeBadge[cd.type]||''}
        <span class="camp-meta">${cd.calls} calls · ${fmtDur(cd.sec)}</span>
      </div>
      <div class="tbl-scroll">
        <table class="dtbl">
          <thead><tr>
            <th class="th-a">Agent</th><th>Bar</th><th>Calls</th>
            <th>&gt;30s</th><th>&gt;2m</th><th>&gt;10m</th><th>&gt;30m</th>
            <th>Avg</th><th>Total</th><th>Enrolled</th>
          </tr></thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      </div>
    </div>`;
  });

  // Top closers table
  let topHtml='';
  topEnrollers.forEach((a,i)=>{
    const avg=a.calls?Math.round(a.sec/a.calls):0;
    topHtml+=`<tr>
      <td style="font-weight:500">${a.name}</td>
      <td class="good">${a.enr}</td>
      <td style="text-align:right;color:#CBD5E1">${fmt$(a.debt)}</td>
      <td style="color:#94A3B8">${a.calls}</td>
      <td style="color:#94A3B8">${fmtDur(avg)}</td>
    </tr>`;
  });

  // Problem agents table
  let probHtml='';
  problemAgents.forEach(a=>{
    const isBad=a.shortPct>=55;
    probHtml+=`<tr class="${isBad?'row-bad-r':'row-bad-a'}">
      <td style="font-weight:500;color:${isBad?'#FCA5A5':'#FDE68A'}">${a.name}</td>
      <td class="${isBad?'bad-r':'bad-a'}">${a.calls}</td>
      <td class="${isBad?'bad-r':'bad-a'}">${a.shortPct.toFixed(1)}%</td>
      <td style="color:#94A3B8">${a.enr}</td>
    </tr>`;
  });

  // Action items — dynamically flag if issues exceed thresholds
  const deadPct=(dead/total*100).toFixed(1);
  const dncPct=(dncCount/total*100).toFixed(1);
  const ahVdclPct=Math.round(ahVdcl/Math.max(vdclRows.length,1)*100);

  return `
  <div class="r-header">
    <div style="display:flex;align-items:center;gap:0">
      <button class="back-btn" onclick="goBack()">← New Report</button>
      <div>
        <div class="r-title">📞 Call Activity Report</div>
        <div class="r-meta">${dateStr} · VICi/Ytel Dialer · Full Day · ${total.toLocaleString()} calls</div>
      </div>
    </div>
    <div class="r-badge">
      <div class="r-badge-val">${enrollTotal} enrolled · ${fmt$(totalDebt)}</div>
      <div class="r-badge-sub">${pct(enrollTotal,total)} overall · ${pct(enrollTotal,mktRows.length)} mkt conv.</div>
    </div>
  </div>

  <div class="kpi-grid">
    <div class="kpi-tile" style="--c:#2563EB">
      <div class="kpi-label">Total Calls</div>
      <div class="kpi-value">${total.toLocaleString()}</div>
      <div class="kpi-sub">↓ ${inbound.toLocaleString()} in · ↑ ${outbound.toLocaleString()} out</div>
    </div>
    <div class="kpi-tile" style="--c:#1D4ED8">
      <div class="kpi-label">Marketing Calls</div>
      <div class="kpi-value">${mktRows.length.toLocaleString()}</div>
      <div class="kpi-sub">${pct(mktRows.length,total)} of total</div>
    </div>
    <div class="kpi-tile" style="--c:#C2410C">
      <div class="kpi-label">Manual Dials</div>
      <div class="kpi-value">${manRows.length.toLocaleString()}</div>
      <div class="kpi-sub">${pct(manRows.length,total)} of total</div>
    </div>
    <div class="kpi-tile" style="--c:#DC2626">
      <div class="kpi-label">Dead ≤30s</div>
      <div class="kpi-value">${deadPct}%</div>
      <div class="kpi-sub">${dead.toLocaleString()} calls wasted</div>
    </div>
    <div class="kpi-tile" style="--c:#059669">
      <div class="kpi-label">&gt; 2 Min</div>
      <div class="kpi-value">${gt2m.toLocaleString()}</div>
      <div class="kpi-sub">${pct(gt2m,total)} of all calls</div>
    </div>
    <div class="kpi-tile" style="--c:#D97706">
      <div class="kpi-label">&gt; 10 Min</div>
      <div class="kpi-value">${gt10m.toLocaleString()}</div>
      <div class="kpi-sub">${pct(gt10m,total)} of all calls</div>
    </div>
    <div class="kpi-tile" style="--c:#7C3AED">
      <div class="kpi-label">&gt; 30 Min</div>
      <div class="kpi-value">${gt30m.toLocaleString()}</div>
      <div class="kpi-sub">${pct(gt30m,total)} of all calls</div>
    </div>
    <div class="kpi-tile" style="--c:#0891B2">
      <div class="kpi-label">Total Talk Time</div>
      <div class="kpi-value" style="font-size:1.25rem">${fmtDur(totalSec)}</div>
      <div class="kpi-sub">All agents combined</div>
    </div>
  </div>

  <div class="mkt-box">
    <div class="mkt-box-hdr">
      <div class="mkt-box-title">📊 Marketing Queue Summary</div>
      <div class="mkt-box-sub">${mktRows.length} calls · ${pct(gt2m,total)} &gt;2 min · ${enrollTotal} enrolled · ${fmt$(totalDebt)} debt</div>
    </div>
    <div class="mkt-cards">${mktCardsHtml}</div>
  </div>

  <div class="filter-bar">
    <span style="font-size:.73rem;color:#64748B;align-self:center;margin-right:4px">Filter:</span>
    <button class="filter-btn active" onclick="filterCamps('all',this)">All</button>
    <button class="filter-btn f-mkt" onclick="filterCamps('Marketing',this)">Marketing</button>
    <button class="filter-btn f-man" onclick="filterCamps('Manual',this)">Manual</button>
    <button class="filter-btn f-oth" onclick="filterCamps('Other',this)">Other</button>
    <button class="filter-btn f-vdcl" onclick="filterCamps('VDCL',this)">VDCL</button>
  </div>

  <div class="camps-container">${campsHtml}</div>

  <!-- ── ACTION PLAN ── -->
  <div class="ap-wrap">
    <div class="ap-hdr">
      <div>
        <div class="ap-hdr-title">⚡ Ops Action Plan</div>
        <div class="ap-hdr-sub">Auto-generated from this report's data · ${dateStr}</div>
      </div>
      <div class="ap-hdr-badge">
        <div class="ap-hdr-badge-val">${enrollTotal} enrolled · ${fmt$(totalDebt)} debt</div>
        <div class="ap-hdr-badge-sub">${pct(enrollTotal,total)} overall · ${pct(enrollTotal,mktRows.length)} mkt conv.</div>
      </div>
    </div>

    <div class="health-grid">
      <div class="health-tile" style="border-top:3px solid #DC2626">
        <div class="ht-lbl">Dead calls ≤30s</div>
        <div class="ht-val" style="color:#FCA5A5">${deadPct}%</div>
        <div class="ht-sub">${dead.toLocaleString()} of ${total.toLocaleString()} calls</div>
      </div>
      <div class="health-tile" style="border-top:3px solid #DC2626">
        <div class="ht-lbl">DNC still dialed</div>
        <div class="ht-val" style="color:#FCA5A5">${dncCount}</div>
        <div class="ht-sub">${dncPct}% · compliance risk</div>
      </div>
      <div class="health-tile" style="border-top:3px solid #DC2626">
        <div class="ht-lbl">PLR drops</div>
        <div class="ht-val" style="color:#FCA5A5">${plrDrops}</div>
        <div class="ht-sub">Campaign config broken</div>
      </div>
      <div class="health-tile" style="border-top:3px solid #D97706">
        <div class="ht-lbl">After-hrs VDCL</div>
        <div class="ht-val" style="color:#FDE68A">${ahVdcl}</div>
        <div class="ht-sub">${ahVdclPct}% of all VDCL drops</div>
      </div>
      <div class="health-tile" style="border-top:3px solid #D97706">
        <div class="ht-lbl">PLIinbound dead</div>
        <div class="ht-val" style="color:#FDE68A">${pct(pliShort,pliTotal)}</div>
        <div class="ht-sub">${pliShort} of ${pliTotal} calls ≤30s</div>
      </div>
      <div class="health-tile" style="border-top:3px solid #059669">
        <div class="ht-lbl">Mkt conversion</div>
        <div class="ht-val" style="color:#6EE7B7">${pct(enrollTotal,mktRows.length)}</div>
        <div class="ht-sub">${enrollTotal} from ${mktRows.length} mkt calls</div>
      </div>
    </div>

    <div class="ap-cols">
      <div>
        <p class="sec-lbl">Fix now — today</p>
        <div class="action-items">
          <div class="action-item crit">
            <div class="ai-title">Set after-hours dialer cutoff in Ytel</div>
            <div class="ai-desc">${ahVdcl} VDCL drops after 6 pm. Dialer fires leads after agents leave — callers hit dead air. Configure campaign end-time on PLR, PLIinbound, TransferK. Add IVR fallback.</div>
            <div class="ai-tags"><span class="tag tag-ytel">Ytel config</span><span class="tag tag-ops">Ops</span></div>
          </div>
          <div class="action-item crit">
            <div class="ai-title">Scrub ${dncCount} DNC numbers off all active lists</div>
            <div class="ai-desc">${dncPct}% of calls hit DNC — active compliance liability. Enable Ytel DNC auto-suppression so any DNC dispo instantly removes the number from all campaigns.</div>
            <div class="ai-tags"><span class="tag tag-list">List mgmt</span><span class="tag tag-comp">Compliance</span></div>
          </div>
          <div class="action-item crit">
            <div class="ai-title">Pause PLR — ${plrDrops} drops, config is broken</div>
            <div class="ai-desc">PLR generated more drops than real conversations. Pause immediately, fix agent-availability settings, resume only when drop rate is under 5%.</div>
            <div class="ai-tags"><span class="tag tag-ytel">Ytel config</span></div>
          </div>
        </div>

        <p class="sec-lbl">Fix this week</p>
        <div class="action-items">
          <div class="action-item high">
            <div class="ai-title">Restrict marketing queues to proven closers</div>
            <div class="ai-desc">Route LenderProcessing, USAbright, PLIinbound to agents with demonstrated talk time and conversion. Remove high short-% agents from marketing queues until they improve.</div>
            <div class="ai-tags"><span class="tag tag-agent">Agent routing</span><span class="tag tag-ytel">Ytel config</span></div>
          </div>
          <div class="action-item high">
            <div class="ai-title">Pull call recordings — top 2 short-% agents</div>
            <div class="ai-desc">Determine if high short-call rates are behavior or bad lead routing before next dial session. Coach or reassign accordingly.</div>
            <div class="ai-tags"><span class="tag tag-agent">Coaching</span></div>
          </div>
          <div class="action-item low">
            <div class="ai-title">Build daily enrollment × calls report</div>
            <div class="ai-desc">Auto-join Ytel export + CRM by agent each morning. Metrics: calls, talk time, enrolled, enrolled debt, conversion %. Run before huddle.</div>
            <div class="ai-tags"><span class="tag tag-ops">Ops</span></div>
          </div>
        </div>
      </div>

      <div>
        <p class="sec-lbl">Top closers</p>
        <div class="agent-tbl-wrap">
          <table class="atbl">
            <thead><tr><th>Agent</th><th>Enroll</th><th>Debt</th><th>Calls</th><th>Avg Talk</th></tr></thead>
            <tbody>${topHtml}</tbody>
          </table>
        </div>

        <p class="sec-lbl">Agents needing attention</p>
        <div class="agent-tbl-wrap">
          <table class="atbl">
            <thead><tr><th>Agent</th><th>Calls</th><th>Short%</th><th>Enrolled</th></tr></thead>
            <tbody>${probHtml}</tbody>
          </table>
        </div>

        <p class="sec-lbl">Owner summary</p>
        <div class="owner-tbl-wrap">
          <table class="owner-tbl">
            <thead><tr><th>Action</th><th>Owner</th><th>When</th></tr></thead>
            <tbody>
              <tr><td>After-hours cutoff</td><td style="color:#94A3B8">Ytel admin</td><td><span class="tpill tp-today">Today</span></td></tr>
              <tr><td>DNC list scrub</td><td style="color:#94A3B8">List mgr</td><td><span class="tpill tp-today">Today</span></td></tr>
              <tr><td>Pause + fix PLR</td><td style="color:#94A3B8">Ytel admin</td><td><span class="tpill tp-today">Today</span></td></tr>
              <tr><td>Mkt queue routing</td><td style="color:#94A3B8">Ytel admin</td><td><span class="tpill tp-week">This week</span></td></tr>
              <tr><td>Call recordings review</td><td style="color:#94A3B8">Supervisor</td><td><span class="tpill tp-week">This week</span></td></tr>
              <tr><td>Daily enroll report</td><td style="color:#94A3B8">Ops</td><td><span class="tpill tp-month">This month</span></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div class="r-footer">CONFIDENTIAL — Internal Use Only · ${dateStr} · VICi/Ytel CSV Export</div>
  `;
}

// ── Filter camps ──────────────────────────────────────────────────────────────
function filterCamps(type,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.camp-block').forEach(el=>{
    el.style.display=(type==='all'||el.dataset.type===type)?'':'none';
  });
}

function goBack(){
  document.getElementById('report').style.display='none';
  document.getElementById('report').innerHTML='';
  document.getElementById('uploader').style.display='flex';
  document.getElementById('gen-btn').disabled=false;
  document.getElementById('gen-btn').textContent='Generate Report →';
}
</script>
</body>
</html>
